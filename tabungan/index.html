<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Program Tabungan</title>
  <style>
    body { font-family: Arial; padding: 20px; background:#f5f5f5; }
    .card { background:white; padding:20px; border-radius:12px; max-width:400px; margin:auto; box-shadow:0 4px 10px rgba(0,0,0,0.1);} 
    h2 { text-align:center; }
    input, button { width:100%; padding:10px; margin-top:10px; border-radius:8px; border:1px solid #ccc; }
    button { background:#4CAF50; color:white; border:none; cursor:pointer; }
    progress { width:100%; height:20px; margin-top:10px; }
  </style>
</head>
<body>

<div class="card">
  <h2>Tabungan</h2>

  <p id="target"></p>
  <p id="terkumpul"></p>
  <p id="hari"></p>

  <progress id="progress"></progress>

  <input type="text" id="input" value="20.000">
  <button onclick="tambah()">Tambah</button>
</div>

<script>
const indo = new Intl.NumberFormat('id-ID');

let dataKey = "tabungan_data";

let totalTarget = 0;
let totalTerkumpul = 0;
let jumlahHariTarget = 0;
let hariTerkumpul = 0;

function hitungTarget(){
  let start = new Date('2026-03-29');
  let end = new Date('2027-02-07');

  jumlahHariTarget = Math.floor((end - start) / (1000*60*60*24)) + 1;
  totalTarget = jumlahHariTarget * 20000;
}

function loadData(){
  let data = localStorage.getItem(dataKey);
  if(data){
    let obj = JSON.parse(data);
    totalTerkumpul = obj.total || 0;
    hariTerkumpul = obj.hari || 0;
  }
}

function saveData(){
  let obj = {
    total: totalTerkumpul,
    hari: hariTerkumpul
  };
  localStorage.setItem(dataKey, JSON.stringify(obj));
}

function updateUI(){
  document.getElementById('target').innerText = "Total Target: Rp " + indo.format(totalTarget);
  document.getElementById('terkumpul').innerText = "Terkumpul: Rp " + indo.format(totalTerkumpul);
  document.getElementById('hari').innerText = hariTerkumpul + " / " + jumlahHariTarget + " Hari";

  let progress = document.getElementById('progress');
  progress.max = jumlahHariTarget;
  progress.value = hariTerkumpul;
}

function tambah(){
  let input = document.getElementById('input').value.replace(/\./g, '');
  let angka = parseInt(input);

  if(!isNaN(angka)){
    totalTerkumpul += angka;
    hariTerkumpul += 1;
    saveData();
    updateUI();
  } else {
    alert("Masukkan angka valid!");
  }
}

// format otomatis
let inputBox = document.getElementById('input');
inputBox.addEventListener('input', function(){
  let angka = this.value.replace(/\./g, '');
  if(!isNaN(angka) && angka !== ""){
    this.value = indo.format(angka);
  }
});

// init
hitungTarget();
loadData();
updateUI();
</script>

</body>
</html>
