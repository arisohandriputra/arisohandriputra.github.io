<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CPU Metic Report</title>

<style>

body{
    margin:0;
    padding:10px;
    background:#c0c0c0;
    font-family:Tahoma,Verdana,Arial,sans-serif;
    font-size:12px;
    color:#000;
}

.container{
    max-width:900px;
    margin:auto;
}

.header{
    background:#000080;
    color:white;
    padding:8px;
    font-size:20px;
    font-weight:bold;
    text-align:center;

    border-top:2px solid #ffffff;
    border-left:2px solid #ffffff;
    border-right:2px solid #404040;
    border-bottom:2px solid #404040;
}

.scorebox{
    margin-top:10px;
    background:#d4d0c8;
    padding:15px;
    text-align:center;

    border-top:2px solid #ffffff;
    border-left:2px solid #ffffff;
    border-right:2px solid #404040;
    border-bottom:2px solid #404040;
}

.userid{
    font-size:14px;
    font-weight:bold;
}

.score{
    font-size:72px;
    font-weight:bold;
    color:#000080;
    line-height:1;
}

.rating{
    font-size:16px;
    font-weight:bold;
    margin-top:5px;
}

.panel{
    margin-top:10px;
    background:#d4d0c8;

    border-top:2px solid #ffffff;
    border-left:2px solid #ffffff;
    border-right:2px solid #404040;
    border-bottom:2px solid #404040;
}

.paneltitle{
    background:#000080;
    color:white;
    padding:5px;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
}

td{
    padding:8px;
    border:1px solid #808080;
}

td:first-child{
    width:35%;
    background:#e8e8e8;
    font-weight:bold;
}

.footer{
    text-align:center;
    margin-top:15px;
    color:#444;
    font-size:11px;
}

.loading{
    text-align:center;
    font-size:20px;
    margin-top:50px;
}

.error{
    color:red;
    text-align:center;
    font-size:18px;
    margin-top:50px;
}

@media(max-width:600px){

    body{
        font-size:11px;
    }

    .score{
        font-size:48px;
    }

    td{
        display:block;
        width:auto;
    }

    td:first-child{
        width:auto;
    }

}

</style>

</head>
<body>

<div id="content" class="loading">
Loading Benchmark Report...
</div>

<script>

const id = new URLSearchParams(window.location.search).get("id");

if(!id)
{
    document.getElementById("content").innerHTML =
    '<div class="error">No User ID Specified</div>';
}
else
{

fetch(
"https://cpumetic-default-rtdb.asia-southeast1.firebasedatabase.app/" +
id +
".json"
)

.then(response => response.json())

.then(pc => {

if(!pc)
{
    document.getElementById("content").innerHTML =
    '<div class="error">Benchmark Report Not Found</div>';
    return;
}

let html = `

<div class="container">

<div class="header">
CPU METIC ONLINE BENCHMARK
</div>

<div class="scorebox">

<div class="userid">
${id}
</div>

<div class="score">
${pc.result.score}
</div>

<div class="rating">
${pc.result.rating_text}
</div>

</div>

<div class="panel">

<div class="paneltitle">
CPU INFORMATION
</div>

<table>

<tr>
<td>Processor</td>
<td>${pc.cpu.name}</td>
</tr>

<tr>
<td>Clock Speed</td>
<td>${pc.cpu.speed}</td>
</tr>

<tr>
<td>Core Count</td>
<td>${pc.cpu.cores}</td>
</tr>

</table>

</div>

<div class="panel">

<div class="paneltitle">
COMPRESSION TEST
</div>

<table>

<tr>
<td>Compression Speed</td>
<td>${pc.compression.speed}</td>
</tr>

<tr>
<td>Execution Time</td>
<td>${pc.compression.time}</td>
</tr>

</table>

</div>

<div class="panel">

<div class="paneltitle">
CRYPTOGRAPHIC TEST
</div>

<table>

<tr>
<td>Encryption Speed</td>
<td>${pc.cryptographic.speed}</td>
</tr>

<tr>
<td>Execution Time</td>
<td>${pc.cryptographic.time}</td>
</tr>

</table>

</div>

<div class="panel">

<div class="paneltitle">
BENCHMARK RESULT
</div>

<table>

<tr>
<td>Performance Score</td>
<td>${pc.result.score}/${pc.result.score_max}</td>
</tr>

<tr>
<td>Rating</td>
<td>${pc.result.rating_text}</td>
</tr>

<tr>
<td>Report Date</td>
<td>${pc.report_date}</td>
</tr>

</table>

</div>

<div class="footer">
CPU Metic Benchmark Database © 2026
</div>

</div>

`;

document.getElementById("content").innerHTML = html;

})

.catch(error => {

document.getElementById("content").innerHTML =
'<div class="error">Failed To Load Benchmark Report</div>';

console.log(error);

});

}

</script>

</body>
</html>
