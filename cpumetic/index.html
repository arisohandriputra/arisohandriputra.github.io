<!DOCTYPE html>

<html>

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CPU Metic Benchmark Database</title>

<style>

body{
    margin:0;
    padding:10px;
    background:#c0c0c0;
    font-family:Tahoma,Verdana,Arial,sans-serif;
    font-size:12px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.header{
    background:#000080;
    color:white;
    padding:8px;
    text-align:center;
    font-size:22px;
    font-weight:bold;

    border-top:2px solid #ffffff;
    border-left:2px solid #ffffff;
    border-right:2px solid #404040;
    border-bottom:2px solid #404040;
}

.subheader{
    margin-top:8px;
    background:#d4d0c8;
    padding:8px;

    border-top:2px solid #ffffff;
    border-left:2px solid #ffffff;
    border-right:2px solid #404040;
    border-bottom:2px solid #404040;
}

.panel{
    margin-top:10px;
    background:#d4d0c8;

    border-top:2px solid #ffffff;
    border-left:2px solid #ffffff;
    border-right:2px solid #404040;
    border-bottom:2px solid #404040;
}

.paneltitle{
    background:#000080;
    color:white;
    padding:5px;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#e0e0e0;
    padding:8px;
    border:1px solid #808080;
}

td{
    padding:8px;
    border:1px solid #808080;
}

tr:hover{
    background:#efefef;
}

.rank{
    text-align:center;
    font-weight:bold;
}

.score{
    text-align:center;
    font-weight:bold;
    color:#000080;
}

a{
    color:#0000cc;
    text-decoration:none;
    font-weight:bold;
}

a:hover{
    text-decoration:underline;
}

.loading{
    padding:20px;
    text-align:center;
}

.footer{
    margin-top:10px;
    text-align:center;
    font-size:11px;
    color:#444;
}

@media(max-width:700px){

table{
    font-size:11px;
}

th:nth-child(3),
td:nth-child(3){
    display:none;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header">
CPU METIC BENCHMARK DATABASE
</div>

<div class="subheader">
Online CPU Benchmark Repository
</div>

<div class="panel">

<div class="paneltitle">
GLOBAL RANKING
</div>

<div id="list" class="loading">
Loading benchmark database...
</div>

</div>

<div class="footer">
CPU Metic Benchmark Database © 2026
</div>

</div>

<script>

fetch(
"https://cpumetic-default-rtdb.asia-southeast1.firebasedatabase.app/.json"
)

.then(r => r.json())

.then(data => {

let arr = [];

Object.keys(data).forEach(id => {

arr.push({
id:id,
score:data[id].result.score,
cpu:data[id].cpu.name,
cores:data[id].cpu.cores,
date:data[id].report_date
});

});

arr.sort((a,b) => b.score - a.score);

let html = `
<table>

<tr>
<th width="60">Rank</th>
<th>User ID</th>
<th>Processor</th>
<th width="90">Score</th>
<th width="150">Date</th>
</tr>
`;

arr.forEach((item,index)=>{

html += `
<tr>

<td class="rank">
#${index+1}
</td>

<td>
<a href="view.html?id=${item.id}">
${item.id}
</a>
</td>

<td>
${item.cpu}
<br>
${item.cores}
</td>

<td class="score">
${item.score}/10
</td>

<td>
${item.date}
</td>

</tr>
`;

});

html += "</table>";

document.getElementById("list").innerHTML = html;

})

.catch(error => {

document.getElementById("list").innerHTML =
"Failed to load benchmark database.";

console.log(error);

});

</script>

</body>

</html>
